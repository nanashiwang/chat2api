<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestrator 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm p-8 bg-white rounded-lg shadow">
        <h1 class="text-xl font-semibold text-gray-900 mb-1">chat2api Orchestrator</h1>
        <p class="text-sm text-gray-500 mb-6">多账号实例编排管理面板</p>

        <form method="POST" action="./login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input
                    type="password"
                    name="password"
                    required
                    autofocus
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>
            {% if error %}
            <p class="text-sm text-red-600">{{ error }}</p>
            {% endif %}
            <button
                type="submit"
                class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition"
            >登录</button>
        </form>

        <p class="text-xs text-gray-400 mt-6 text-center">
            密码忘记？SSH 服务器执行：<code class="bg-gray-100 px-1">./manage.sh orch-password</code>
        </p>
    </div>
</body>
</html>
