<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat2api Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div>
            <h1 class="text-lg font-semibold text-gray-900">chat2api Orchestrator</h1>
            <p class="text-xs text-gray-500" id="server-status">加载中...</p>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-refresh" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded">刷新</button>
            <button id="btn-audit" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded">审计日志</button>
            <form method="POST" action="./logout" class="inline">
                <button type="submit" class="text-sm px-3 py-1.5 text-red-600 hover:bg-red-50 rounded">退出</button>
            </form>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold text-gray-900">实例列表</h2>
        <button id="btn-add" class="text-sm px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded">+ 新增账号</button>
    </div>

    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-600 text-xs uppercase">
                <tr>
                    <th class="px-4 py-2 text-left">slug</th>
                    <th class="px-4 py-2 text-left">代理</th>
                    <th class="px-4 py-2 text-left">状态</th>
                    <th class="px-4 py-2 text-left">出口 IP</th>
                    <th class="px-4 py-2 text-left">运行时长</th>
                    <th class="px-4 py-2 text-left">cookie 鲜度</th>
                    <th class="px-4 py-2 text-left">备注</th>
                    <th class="px-4 py-2 text-right">操作</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<!-- 模态：新增/编辑 -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h3 id="modal-title" class="text-lg font-semibold mb-4">新增账号</h3>
        <form id="modal-form" class="space-y-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">slug</label>
                <input id="f-slug" type="text" required pattern="[a-z0-9-]{1,16}" class="w-full px-3 py-2 border border-gray-300 rounded">
                <p class="text-xs text-gray-500 mt-1">小写字母 / 数字 / 连字符，最多 16 位</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">proxy_url（可空）</label>
                <input id="f-proxy" type="text" placeholder="socks5://user:pass@host:port" class="w-full px-3 py-2 border border-gray-300 rounded">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                <input id="f-note" type="text" class="w-full px-3 py-2 border border-gray-300 rounded">
            </div>
            <div id="modal-error" class="text-sm text-red-600 hidden"></div>
            <div class="flex justify-end gap-2 pt-2">
                <button type="button" id="btn-cancel" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">取消</button>
                <button type="submit" id="btn-submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 模态：凭证查看 -->
<div id="modal-secret" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">实例凭证</h3>
            <button id="btn-close-secret" class="text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div id="secret-body" class="space-y-2 text-sm"></div>
    </div>
</div>

<!-- 模态：审计 -->
<div id="modal-audit" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[80vh] flex flex-col">
        <div class="flex items-center justify-between p-4 border-b">
            <h3 class="text-lg font-semibold">操作审计日志</h3>
            <button id="btn-close-audit" class="text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div class="overflow-auto flex-1 p-4">
            <table class="w-full text-xs">
                <thead class="text-gray-500 sticky top-0 bg-white">
                    <tr>
                        <th class="text-left px-2 py-1">时间</th>
                        <th class="text-left px-2 py-1">IP</th>
                        <th class="text-left px-2 py-1">动作</th>
                        <th class="text-left px-2 py-1">slug</th>
                        <th class="text-left px-2 py-1">结果</th>
                        <th class="text-left px-2 py-1">详情</th>
                    </tr>
                </thead>
                <tbody id="audit-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- toast -->
<div id="toast" class="fixed bottom-6 right-6 hidden bg-gray-900 text-white text-sm px-4 py-2 rounded shadow-lg z-50"></div>

<script src="./static/app.js"></script>
</body>
</html>
